<script data-pagetrix-once>
    // only happens once!
    function navigateNextPrevPage() {
        window.location.href = ""
    }

    window.addEventListener('keydown', e => {
        if (e.repeat) return;
        if (e.key == 'ArrowLeft') {
            pagetrix.goto(document.querySelector('a:has(>.leftarrow)').getAttribute('href'))
            // location.href = document.querySelector('a:has(>.leftarrow)').getAttribute('href')
        } else if (e.key == 'ArrowRight') {
            pagetrix.goto(document.querySelector('a:has(>.rightarrow)').getAttribute('href'))
            // location.href = document.querySelector('a:has(>.rightarrow)').getAttribute('href')
        } else if (e.key == 'Escape') {
            e.stopPropagation()
            e.preventDefault()
            pagetrix.goto('..')
            // location.href+=document.querySelector('a:has(>.nextarrow)').getAttribute('href')

            // location.href+='/'+document.querySelector('a:has(>.backarrow)').getAttribute('href')
        }
    })

</script>

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 2px;
  background: transparent;
  cursor: pointer;
}

/* Chrome, Safari, Edge, Opera */
input[type="range"]::-webkit-slider-runnable-track {
  width: 100%;
  height: 2px;
  /* Left = Blue | Right = Black */
  background: linear-gradient(to right, rgb(0, 133, 173) 0%, rgb(0, 133, 173) var(--progress, 0%), #000 var(--progress, 0%), #000 100%);
  border-radius: 2px;
}

/* Firefox Track Logic */
input[type="range"]::-moz-range-progress {
  background-color: rgb(0, 133, 173); /* Blue on left */
  height: 2px;
}

input[type="range"]::-moz-range-track {
  background-color: #000; /* Black on right */
  height: 2px;
}

/* --- THE BLACK CIRCLE (THUMB) --- */

/* Chrome, Safari, Edge */
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  height: 16px;
  width: 16px;
  border-radius: 50%;
  background: #000; /* Set circle to black */
  margin-top: -7px; /* Centers 16px thumb on 2px track */
  border: none;
}

/* Firefox */
input[type="range"]::-moz-range-thumb {
  height: 16px;
  width: 16px;
  border-radius: 50%;
  background: #000; /* Set circle to black */
  border: none;
}
    </style>

<script>const slider = document.querySelector('input[type="range"]');

// 1. The core function that handles the visual "fill"
function updateSliderVisuals() {
  const min = slider.min || 0;
  const max = slider.max || 100;
  const value = slider.value;
  
  const percentage = (value - min) * 100 / (max - min);
  slider.style.setProperty('--progress', percentage + '%');
}

// 2. Listen for manual user interaction (dragging/clicking)
slider.addEventListener('input', updateSliderVisuals);

// 3. How to update it via CODE
function updateSliderByCode(newValue) {
  slider.value = newValue;   // Sets the physical position
  updateSliderVisuals();     // Sets the blue/black colors
}

// Initial call to set the color on page load
updateSliderVisuals();

// --- EXAMPLE USAGE ---

</script>
